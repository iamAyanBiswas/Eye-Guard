services:
  eyeguard-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: eyeguard-api
    ports:
      - "8080:8080"
    env_file:
      - api/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
